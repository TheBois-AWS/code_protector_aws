name: docs-check

on:
  pull_request:
    paths:
      - src/router.js
      - frontend/docs/**
      - scripts/docs/**
      - package.json
      - package-lock.json
      - .github/workflows/docs-check.yml
  push:
    branches:
      - main
    paths:
      - src/router.js
      - frontend/docs/**
      - scripts/docs/**
      - package.json
      - package-lock.json
      - .github/workflows/docs-check.yml
  workflow_dispatch:
    inputs:
      run_capture:
        description: Run Playwright screenshot capture
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Validate OpenAPI + Route Parity
        run: npm run docs:check

  capture:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_capture == 'true'
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate Screenshots
        run: npm run docs:capture

      - name: Upload Screenshot Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-screens
          path: frontend/docs/assets/screens
          if-no-files-found: error