openapi: 3.0.3
info:
  title: code_protector_aws API
  version: 1.0.0
  description: OpenAPI documentation for the live routes declared in src/router.js.
servers:
  - url: /

x-auth-either: &authEither
  - bearerAuth: []
  - cookieAuth: []

x-common-error-responses: &commonErrorResponses
  '400':
    $ref: '#/components/responses/StandardError'
  '401':
    $ref: '#/components/responses/StandardError'
  '403':
    $ref: '#/components/responses/StandardError'
  '404':
    $ref: '#/components/responses/StandardError'
  '429':
    $ref: '#/components/responses/StandardError'
  '500':
    $ref: '#/components/responses/StandardError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
    pinToken:
      type: apiKey
      in: header
      name: X-Pin-Token

  parameters:
    WorkspaceId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
    LicenseId:
      name: id
      in: path
      required: true
      schema:
        type: string
    RuleId:
      name: id
      in: path
      required: true
      schema:
        type: string
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    InviteId:
      name: inviteId
      in: path
      required: true
      schema:
        type: string
    InvitationToken:
      name: token
      in: path
      required: true
      schema:
        type: string
    LoaderId:
      name: id
      in: path
      required: true
      schema:
        type: string
    PinTokenHeader:
      name: X-Pin-Token
      in: header
      required: false
      schema:
        type: string

  responses:
    StandardError:
      description: Standard error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
      additionalProperties: false

    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          enum: [true]
      additionalProperties: true

    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            service:
              type: string

    WsConfigResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            endpoint:
              type: string
              nullable: true

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      additionalProperties: true

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - confirmPassword
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        confirmPassword:
          type: string
      additionalProperties: true

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      additionalProperties: true

    UpdateProfileRequest:
      type: object
      properties:
        display_name:
          type: string
      additionalProperties: true

    DeleteAccountRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
      additionalProperties: true

    WorkspaceCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        language:
          type: string
          enum: [python, nodejs, userscript, lua, javascript]
      additionalProperties: true

    WorkspaceSettingsRequest:
      type: object
      properties:
        default_project_id:
          type: string
          nullable: true
        default_script_id:
          type: string
          nullable: true
        discord_webhook:
          type: string
      additionalProperties: true

    PinSetRequest:
      type: object
      required:
        - pin
      properties:
        pin:
          type: string
          pattern: '^[0-9]{6}$'
      additionalProperties: true

    PinVerifyRequest:
      type: object
      required:
        - pin
      properties:
        pin:
          type: string
      additionalProperties: true

    ProjectCreateRequest:
      type: object
      required:
        - name
        - content
      properties:
        name:
          type: string
        content:
          type: string
      additionalProperties: true

    ProjectUpdateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
      additionalProperties: true

    ProjectSettingsRequest:
      type: object
      properties:
        require_license:
          type: boolean
        require_hwid:
          type: boolean
        ip_whitelist_enabled:
          type: boolean
        max_executions:
          type: integer
          nullable: true
        rate_limit:
          type: integer
      additionalProperties: true

    ProjectRenameRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
      additionalProperties: true

    FileCreateRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum: [file, folder]
        parent_id:
          type: string
          nullable: true
        content:
          type: string
      additionalProperties: true

    FileUpdateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
      additionalProperties: true

    FileRenameRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
      additionalProperties: true

    FileMoveRequest:
      type: object
      properties:
        parent_id:
          type: string
          nullable: true
      additionalProperties: true

    FileUploadRequest:
      type: object
      required:
        - files
      properties:
        parent_id:
          type: string
          nullable: true
        files:
          type: array
          items:
            type: object
            required:
              - name
            properties:
              name:
                type: string
              content:
                type: string
              encoding:
                type: string
              is_base64:
                type: boolean
            additionalProperties: true
      additionalProperties: true

    FileSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        regex:
          type: boolean
      additionalProperties: true

    BatchFileRequest:
      type: object
      required:
        - action
        - file_ids
      properties:
        action:
          type: string
          enum: [delete, move]
        file_ids:
          type: array
          items:
            type: string
        target_parent_id:
          type: string
          nullable: true
      additionalProperties: true

    AccessRuleRequest:
      type: object
      required:
        - identifier
        - type
      properties:
        identifier:
          type: string
        type:
          type: string
          enum: [blacklist, whitelist]
        note:
          type: string
      additionalProperties: true

    TeamInviteRequest:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, editor, viewer]
      additionalProperties: true

    TeamMemberUpdateRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [admin, editor, viewer]
      additionalProperties: true

    LicenseCreateRequest:
      type: object
      properties:
        project_id:
          type: string
        script_id:
          type: string
        custom_key:
          type: string
        prefix:
          type: string
        suffix:
          type: string
        note:
          type: string
        expiration_date:
          type: string
      additionalProperties: true

    LicenseBatchCreateRequest:
      allOf:
        - $ref: '#/components/schemas/LicenseCreateRequest'
        - type: object
          properties:
            count:
              type: integer
              minimum: 1
              maximum: 100

    LoaderExecuteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            e:
              type: string
            s:
              type: string
            t:
              type: integer
            v:
              type: integer

    HandshakeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            pk:
              type: string
            e:
              type: string
            s:
              type: string
            t:
              type: integer
            v:
              type: integer

paths:
  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      responses:
        '200':
          description: Health check response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/ws/config:
    get:
      tags: [Health]
      operationId: getWsConfig
      responses:
        '200':
          description: WebSocket configuration endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WsConfigResponse'

  /api/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '201':
          description: Account bootstrap response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/register:
    post:
      tags: [Auth]
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/user/password:
    post:
      tags: [Auth]
      operationId: changePassword
      security: *authEither
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/user/profile:
    get:
      tags: [Auth]
      operationId: getProfile
      security: *authEither
      responses:
        '200':
          description: User profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    put:
      tags: [Auth]
      operationId: updateProfile
      security: *authEither
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/user/stats:
    get:
      tags: [Auth]
      operationId: getUserStats
      security: *authEither
      responses:
        '200':
          description: User statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/user/account:
    delete:
      tags: [Auth]
      operationId: deleteAccount
      security: *authEither
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: Account deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      security: *authEither
      responses:
        '200':
          description: Workspace list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      security: *authEither
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreateRequest'
      responses:
        '200':
          description: Workspace created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}:
    get:
      tags: [Workspaces]
      operationId: getWorkspaceDetails
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/PinTokenHeader'
      responses:
        '200':
          description: Workspace details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Workspaces]
      operationId: deleteWorkspace
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}/settings:
    put:
      tags: [Workspaces]
      operationId: updateWorkspaceSettings
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSettingsRequest'
      responses:
        '200':
          description: Workspace settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}/logs:
    get:
      tags: [Workspaces]
      operationId: getWorkspaceLogs
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Workspace logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Workspaces]
      operationId: clearWorkspaceLogs
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Logs cleared.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}/pin:
    post:
      tags: [Workspaces]
      operationId: setWorkspacePin
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinSetRequest'
      responses:
        '200':
          description: PIN enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Workspaces]
      operationId: removeWorkspacePin
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: PIN removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}/pin/verify:
    post:
      tags: [Workspaces]
      operationId: verifyWorkspacePin
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinVerifyRequest'
      responses:
        '200':
          description: PIN verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}/projects:
    post:
      tags: [Projects]
      operationId: createProject
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '200':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}:
    put:
      tags: [Projects]
      operationId: updateProject
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Project updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Projects]
      operationId: deleteProject
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/settings:
    put:
      tags: [Projects]
      operationId: updateProjectSettings
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSettingsRequest'
      responses:
        '200':
          description: Project settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/toggle-active:
    post:
      tags: [Projects]
      operationId: toggleProjectActive
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project active state toggled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/reset-stats:
    post:
      tags: [Projects]
      operationId: resetProjectStats
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project stats reset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/rename:
    put:
      tags: [Projects]
      operationId: renameProject
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRenameRequest'
      responses:
        '200':
          description: Project renamed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/workspaces/{id}/scripts:
    post:
      tags: [Projects]
      operationId: createProjectAlias
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '200':
          description: Alias for project creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scripts/{id}:
    put:
      tags: [Projects]
      operationId: updateProjectAlias
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Alias for project update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Projects]
      operationId: deleteProjectAlias
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Alias for project delete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scripts/{id}/settings:
    put:
      tags: [Projects]
      operationId: updateProjectAliasSettings
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSettingsRequest'
      responses:
        '200':
          description: Alias for project settings update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scripts/{id}/toggle-active:
    post:
      tags: [Projects]
      operationId: toggleProjectAliasActive
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Alias for toggling active state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scripts/{id}/reset-stats:
    post:
      tags: [Projects]
      operationId: resetProjectAliasStats
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Alias for resetting stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/scripts/{id}/rename:
    put:
      tags: [Projects]
      operationId: renameProjectAlias
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRenameRequest'
      responses:
        '200':
          description: Alias for project rename.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/files:
    get:
      tags: [Files]
      operationId: getFileTree
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project file tree.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Files]
      operationId: createFile
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileCreateRequest'
      responses:
        '200':
          description: File created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/files/{fileId}/content:
    get:
      tags: [Files]
      operationId: getFileContent
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: File content or raw download.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/projects/{id}/files/{fileId}:
    put:
      tags: [Files]
      operationId: updateFileContent
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUpdateRequest'
      responses:
        '200':
          description: File updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Files]
      operationId: deleteFile
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: File deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/projects/{id}/files/{fileId}/rename:
    put:
      tags: [Files]
      operationId: renameFile
      security: *authEither
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileRenameRequest'
      responses:
        '200':
          description: File renamed.
          content:
