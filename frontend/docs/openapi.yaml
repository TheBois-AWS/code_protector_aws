        - name: l
          in: query
          required: false
          schema:
            type: string
        - name: h
          in: query
          required: false
          schema:
            type: string
        - name: t
          in: query
          required: true
          schema:
            type: integer
        - name: s
          in: query
          required: true
          schema:
            type: string
        - name: n
          in: query
          required: true
          schema:
            type: string
        - name: p
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Encrypted execution payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoaderExecuteResponse'
        '400':
          description: Loader request error.
