<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/png" href="/assets/anhnen2.png">
    <style>
        :root {
            --bg-0: #030712;
            --bg-1: #0f172a;
            --accent-a: #38bdf8;
            --accent-b: #a855f7;
            --accent-c: #22d3ee;
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --panel: rgba(2, 6, 23, 0.55);
            --border: rgba(148, 163, 184, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            overflow: hidden;
            background:
                radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.18), transparent 46%),
                radial-gradient(circle at 84% 20%, rgba(168, 85, 247, 0.16), transparent 44%),
                radial-gradient(circle at 48% 82%, rgba(34, 211, 238, 0.12), transparent 52%),
                linear-gradient(135deg, var(--bg-0), var(--bg-1));
        }

        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 88%);
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(30px);
            opacity: 0.7;
            animation: drift 10s ease-in-out infinite;
        }

        .orb.a {
            width: 220px;
            height: 220px;
            background: rgba(56, 189, 248, 0.3);
            top: -60px;
            left: -50px;
        }

        .orb.b {
            width: 190px;
            height: 190px;
            background: rgba(168, 85, 247, 0.32);
            right: -40px;
            bottom: 10%;
            animation-delay: -3s;
        }

        .orb.c {
            width: 150px;
            height: 150px;
            background: rgba(34, 211, 238, 0.28);
            left: 16%;
            bottom: -30px;
            animation-delay: -6s;
        }

        @keyframes drift {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(14px, -22px, 0) scale(1.08); }
        }

        .wrap {
            position: relative;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(620px, 100%);
            backdrop-filter: blur(12px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 30px;
            box-shadow: 0 30px 80px rgba(2, 6, 23, 0.6);
            text-align: center;
            animation: reveal 420ms ease-out both;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .code {
            font-weight: 800;
            font-size: clamp(72px, 17vw, 150px);
            line-height: 0.9;
            margin: 0;
            letter-spacing: -0.06em;
            background: linear-gradient(130deg, var(--accent-a), var(--accent-b), var(--accent-c));
            background-size: 220% 220%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: hueShift 6s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }

        .code::after {
            content: "404";
            position: absolute;
            inset: 0;
            color: rgba(226, 232, 240, 0.08);
            filter: blur(8px);
            transform: translateY(6px);
            z-index: -1;
        }

        @keyframes hueShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            margin: 16px 0 8px;
            font-size: clamp(26px, 5.4vw, 34px);
            letter-spacing: -0.02em;
        }

        p {
            margin: 0 auto;
            max-width: 460px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            border: 1px solid rgba(56, 189, 248, 0.35);
            background: rgba(56, 189, 248, 0.14);
            color: #dbeafe;
            padding: 11px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: rgba(56, 189, 248, 0.22);
            border-color: rgba(56, 189, 248, 0.58);
        }

        .btn.ghost {
            border-color: rgba(148, 163, 184, 0.3);
            background: rgba(15, 23, 42, 0.45);
            color: #cbd5e1;
        }

        .btn.ghost:hover {
            border-color: rgba(148, 163, 184, 0.5);
            background: rgba(30, 41, 59, 0.55);
        }
    </style>
</head>

<body>
    <div class="grid"></div>
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>

    <main class="wrap">
        <section class="card">
            <p class="code">404</p>
            <h1>Page Not Found</h1>
            <p>The page does not exist, or you do not have permission to view this resource.</p>
            <div class="actions">
                <a class="btn" href="/dashboard">Go to Dashboard</a>
                <a class="btn ghost" href="/login">Login Again</a>
            </div>
        </section>
    </main>
</body>

</html>
