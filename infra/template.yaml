AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: code_protector_aws - CloudFront + S3 + Lambda + DynamoDB

Parameters:
  ProjectName:
    Type: String
    Default: code-protector-aws
  Stage:
    Type: String
    Default: prod
  FrontendBucketName:
    Type: String
    Default: ''
  ContentBucketName:
    Type: String
    Default: ''
  WebAclArn:
    Type: String
    Default: ''
  ApiOriginVerifySecret:
    Type: String
    Default: ''
    NoEcho: true
  CloudFrontAliasDomain:
    Type: String
    Default: ''
  CloudFrontAcmCertificateArn:
    Type: String
    Default: ''
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: '*'
  LambdaCodeS3Bucket:
    Type: String
  LambdaCodeS3Key:
    Type: String
  LambdaMemorySize:
    Type: Number
    Default: 1024
  LambdaTimeout:
    Type: Number
    Default: 30
  LambdaLogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653
  ManageApiLogGroup:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  EnableCloudWatchAlarms:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  HasFrontendBucketName: !Not [!Equals [!Ref FrontendBucketName, '']]
  HasContentBucketName: !Not [!Equals [!Ref ContentBucketName, '']]
  HasWebAclArn: !Not [!Equals [!Ref WebAclArn, '']]
  HasApiOriginVerifySecret: !Not [!Equals [!Ref ApiOriginVerifySecret, '']]
  HasCloudFrontAliasDomain: !Not [!Equals [!Ref CloudFrontAliasDomain, '']]
  HasCloudFrontAcmCertificateArn: !Not [!Equals [!Ref CloudFrontAcmCertificateArn, '']]
  UseCloudFrontCustomDomain: !And
    - !Condition HasCloudFrontAliasDomain
    - !Condition HasCloudFrontAcmCertificateArn
  CreateApiFunctionLogGroup: !Equals [!Ref ManageApiLogGroup, 'true']
  HasCloudWatchAlarms: !Equals [!Ref EnableCloudWatchAlarms, 'true']

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - HasFrontendBucketName
        - !Ref FrontendBucketName
        - !Sub '${ProjectName}-${Stage}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ContentBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - HasContentBucketName
        - !Ref ContentBucketName
        - !Sub '${ProjectName}-${Stage}-content-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-${Stage}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  ApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:BatchGetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt WorkspacesTable.Arn
                  - !GetAtt WorkspaceMembersTable.Arn
                  - !GetAtt WorkspaceInvitationsTable.Arn
                  - !GetAtt ProjectsTable.Arn
                  - !GetAtt ProjectFilesTable.Arn
                  - !GetAtt LicensesTable.Arn
                  - !GetAtt AccessListsTable.Arn
                  - !GetAtt LogsTable.Arn
                  - !GetAtt WebSocketConnectionsTable.Arn
                  - !GetAtt PinVerificationsTable.Arn
                  - !GetAtt RateLimitsTable.Arn
                  - !GetAtt AppConfigTable.Arn
                  - !GetAtt AdminAuditTable.Arn
                  - !Sub '${UsersTable.Arn}/index/*'
                  - !Sub '${WorkspacesTable.Arn}/index/*'
                  - !Sub '${WorkspaceMembersTable.Arn}/index/*'
                  - !Sub '${WorkspaceInvitationsTable.Arn}/index/*'
                  - !Sub '${ProjectsTable.Arn}/index/*'
                  - !Sub '${ProjectFilesTable.Arn}/index/*'
                  - !Sub '${LicensesTable.Arn}/index/*'
                  - !Sub '${AccessListsTable.Arn}/index/*'
                  - !Sub '${LogsTable.Arn}/index/*'
                  - !Sub '${WebSocketConnectionsTable.Arn}/index/*'
                  - !Sub '${PinVerificationsTable.Arn}/index/*'
                  - !Sub '${AdminAuditTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Stage}/POST/@connections/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub '${ContentBucket.Arn}/*'
                  - !Sub '${FrontendBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                  - s3:GetEncryptionConfiguration
                Resource:
                  - !GetAtt ContentBucket.Arn
                  - !GetAtt FrontendBucket.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${ContentBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - lambda:GetFunctionConfiguration
                Resource: !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-${Stage}-api'
              - Effect: Allow
                Action:
                  - cloudfront:GetDistribution
                  - cloudfront:ListDistributions
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:GetMetricStatistics
                  - logs:DescribeLogGroups
                Resource: '*'
              - Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                  - ce:GetCostForecast
                Resource: '*'

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Stage}-api'
      Runtime: nodejs20.x
      CodeUri:
        Bucket: !Ref LambdaCodeS3Bucket
        Key: !Ref LambdaCodeS3Key
      Handler: src/index.handler
      Role: !GetAtt ApiExecutionRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          APP_NAME: code_protector_aws
          APP_STAGE: !Ref Stage
          PROJECT_NAME: !Ref ProjectName
          API_FUNCTION_NAME: !Sub '${ProjectName}-${Stage}-api'
          APP_BASE_URL: !If
            - HasCloudFrontAliasDomain
            - !Sub 'https://${CloudFrontAliasDomain}'
            - ''
          ALLOWED_ORIGINS: !Join [',', !Ref AllowedOrigins]
          CONTENT_BUCKET: !Ref ContentBucket
          APP_ASSETS_BUCKET: !Ref FrontendBucket
          DDB_TABLE_USERS: !Ref UsersTable
          DDB_TABLE_WORKSPACES: !Ref WorkspacesTable
          DDB_TABLE_WORKSPACE_MEMBERS: !Ref WorkspaceMembersTable
          DDB_TABLE_WORKSPACE_INVITATIONS: !Ref WorkspaceInvitationsTable
          DDB_TABLE_PROJECTS: !Ref ProjectsTable
          DDB_TABLE_PROJECT_FILES: !Ref ProjectFilesTable
          DDB_TABLE_LICENSES: !Ref LicensesTable
          DDB_TABLE_ACCESS_LISTS: !Ref AccessListsTable
          DDB_TABLE_LOGS: !Ref LogsTable
          DDB_TABLE_WEBSOCKET_CONNECTIONS: !Ref WebSocketConnectionsTable
          DDB_TABLE_PIN_VERIFICATIONS: !Ref PinVerificationsTable
          DDB_TABLE_RATE_LIMITS: !Ref RateLimitsTable
          DDB_TABLE_APP_CONFIG: !Ref AppConfigTable
          DDB_TABLE_ADMIN_AUDIT: !Ref AdminAuditTable
          DDB_INDEX_ADMIN_AUDIT_BY_ACTOR: ActorIndex
          DDB_INDEX_ADMIN_AUDIT_BY_TARGET: TargetIndex
          API_ORIGIN_VERIFY_SECRET: !Ref ApiOriginVerifySecret
          API_ORIGIN_VERIFY_HEADER: x-origin-verify
          WS_API_ENDPOINT: !Sub 'https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateApiFunctionLogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ApiFunction}'
      RetentionInDays: !Ref LambdaLogRetentionDays

  ApiErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasCloudWatchAlarms
    Properties:
      AlarmName: !Sub '${ProjectName}-${Stage}-api-errors'
      AlarmDescription: Triggered when Lambda reports errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ApiThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasCloudWatchAlarms
    Properties:
      AlarmName: !Sub '${ProjectName}-${Stage}-api-throttles'
      AlarmDescription: Triggered when Lambda receives throttles.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ApiDurationP95Alarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasCloudWatchAlarms
    Properties:
      AlarmName: !Sub '${ProjectName}-${Stage}-api-duration-p95'
      AlarmDescription: Triggered when Lambda p95 duration exceeds 5 seconds.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ApiDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: HasCloudWatchAlarms
    Properties:
      DashboardName: !Sub '${ProjectName}-${Stage}-ops'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Invocations / Errors / Throttles",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${ApiFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Throttles", ".", "." ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Duration (p50/p95/p99)",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${ApiFunction}", { "stat": "p50" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "${ApiFunction}", { "stat": "p95" } ],
                  [ "AWS/Lambda", "Duration", "FunctionName", "${ApiFunction}", { "stat": "p99" } ]
                ]
              }
            }
          ]
        }

  ApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ApiFunction.Arn
      AuthType: NONE
      Cors:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        AllowHeaders:
          - Authorization
          - Content-Type
          - Cookie
          - X-Admin-Guard-Token
          - X-Pin-Token
          - X-Requested-With
          - Origin
          - Accept
        AllowCredentials: true

  ApiFunctionUrlPublicInvokeUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ApiFunction
      Principal: '*'
      FunctionUrlAuthType: NONE

  ApiFunctionUrlPublicInvokeFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: '*'
      InvokedViaFunctionUrl: true

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-${Stage}-ws'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations'
      IntegrationMethod: POST
      PayloadFormatVersion: '1.0'

  WebSocketConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: '$connect'
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: '$disconnect'
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${WebSocketIntegration}'

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Stage
      AutoDeploy: true

  WebSocketLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${ProjectName}-${Stage}-rewrite'
      AutoPublish: true
      FunctionConfig:
        Runtime: cloudfront-js-2.0
        Comment: Rewrite app routes to static pages
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var rawUri = request.uri || '/';
          var uri = rawUri;
          if (uri.length > 1 && uri.charCodeAt(uri.length - 1) === 47) {
            uri = uri.slice(0, -1);
          }
          var hasExtension = uri.lastIndexOf('.') !== -1;
          var protectedRoute = (
            uri === '/dashboard' ||
            uri === '/admin' ||
            uri.indexOf('/workspace') === 0 ||
            uri.indexOf('/admin/') === 0
          );

          if (uri.indexOf('/api/') === 0 || uri.indexOf('/files/') === 0) {
            return request;
          }

          if (!hasExtension && protectedRoute) {
            var hasToken = false;
            if (request.cookies && request.cookies.token && request.cookies.token.value) {
              hasToken = true;
            } else {
              var cookieHeader = request.headers && request.headers.cookie ? request.headers.cookie.value : '';
              hasToken = /(^|;\s*)token=/.test(cookieHeader || '');
            }
            if (!hasToken) {
              var returnTo = uri;
              if (rawUri && rawUri !== uri) {
                returnTo = rawUri;
              }
              if (request.querystring) {
                var queryParts = [];
                for (var q in request.querystring) {
                  if (!Object.prototype.hasOwnProperty.call(request.querystring, q)) continue;
                  var value = request.querystring[q] && request.querystring[q].value ? request.querystring[q].value : '';
                  queryParts.push(encodeURIComponent(q) + '=' + encodeURIComponent(value));
                }
                if (queryParts.length) {
                  returnTo += '?' + queryParts.join('&');
                }
              }
              return {
                statusCode: 302,
                statusDescription: 'Found',
                headers: {
                  location: { value: '/login?returnTo=' + encodeURIComponent(returnTo) },
                  'cache-control': { value: 'no-store, max-age=0' }
                }
              };
            }
          }

          if (uri === '/' || uri === '') {
            request.uri = '/index.html';
            return request;
          }

          if (uri === '/login' || uri === '/register' || uri === '/dashboard' || uri === '/admin' || uri === '/404') {
            request.uri = uri + '/index.html';
            return request;
          }

          if (uri.indexOf('/workspace') === 0 && !hasExtension) {
            request.uri = '/workspace/index.html';
            return request;
          }

          if (!hasExtension) {
            request.uri = '/404/index.html';
          }

          return request;
        }

  StaticCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${ProjectName}-${Stage}-static'
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  NoCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${ProjectName}-${Stage}-nocache'
        DefaultTTL: 0
        MaxTTL: 1
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: false
          EnableAcceptEncodingGzip: false
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases: !If
          - HasCloudFrontAliasDomain
          - - !Ref CloudFrontAliasDomain
          - !Ref AWS::NoValue
        Origins:
          - Id: FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOriginAccessControl
            S3OriginConfig: {}
          - Id: ApiOrigin
            DomainName: !Select
              - 0
              - !Split
                - /
                - !Select
                  - 1
                  - !Split
                    - https://
                    - !GetAtt ApiFunctionUrl.FunctionUrl
            OriginCustomHeaders: !If
              - HasApiOriginVerifySecret
              - - HeaderName: X-Origin-Verify
                  HeaderValue: !Ref ApiOriginVerifySecret
              - !Ref AWS::NoValue
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref StaticCachePolicy
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref NoCachePolicy
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            Compress: false
          - PathPattern: /files/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: !Ref NoCachePolicy
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            Compress: false
        ViewerCertificate: !If
          - UseCloudFrontCustomDomain
          - AcmCertificateArn: !Ref CloudFrontAcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        WebACLId: !If
          - HasWebAclArn
          - !Ref WebAclArn
          - !Ref AWS::NoValue

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  WorkspacesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-workspaces'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: loader_key
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OwnerIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: LoaderKeyIndex
          KeySchema:
            - AttributeName: loader_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  WorkspaceMembersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-workspace-members'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  WorkspaceInvitationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-workspace-invitations'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
        - AttributeName: token
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: TokenIndex
          KeySchema:
            - AttributeName: token
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-projects'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
        - AttributeName: secret_key
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: SecretKeyIndex
          KeySchema:
            - AttributeName: secret_key
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ProjectFilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-project-files'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: parent_id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ProjectIndex
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ParentIndex
          KeySchema:
            - AttributeName: parent_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  LicensesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-licenses'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
        - AttributeName: key
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: KeyIndex
          KeySchema:
            - AttributeName: key
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ProjectIndex
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AccessListsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-access-lists'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  LogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-logs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: WorkspaceTimestampIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connection_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
      KeySchema:
        - AttributeName: connection_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  PinVerificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-pin-verifications'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
        - AttributeName: workspace_id
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: WorkspaceIndex
          KeySchema:
            - AttributeName: workspace_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  RateLimitsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-rate-limits'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  AppConfigTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-app-config'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH

  AdminAuditTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Stage}-admin-audit'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: actor_user_id
          AttributeType: S
        - AttributeName: target_id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ActorIndex
          KeySchema:
            - AttributeName: actor_user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: TargetIndex
          KeySchema:
            - AttributeName: target_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

Outputs:
  FrontendBucketName:
    Value: !Ref FrontendBucket
  ContentBucketName:
    Value: !Ref ContentBucket
  CloudFrontDistributionId:
    Value: !Ref Distribution
  CloudFrontDomainName:
    Value: !GetAtt Distribution.DomainName
  ApiFunctionName:
    Value: !Ref ApiFunction
  ApiFunctionArn:
    Value: !GetAtt ApiFunction.Arn
  ApiFunctionUrl:
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  WebSocketApiId:
    Value: !Ref WebSocketApi
  WebSocketApiEndpoint:
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
  ApiFunctionLogGroupName:
    Condition: CreateApiFunctionLogGroup
    Value: !Ref ApiFunctionLogGroup
  ApiErrorsAlarmName:
    Condition: HasCloudWatchAlarms
    Value: !Ref ApiErrorsAlarm
  ApiThrottlesAlarmName:
    Condition: HasCloudWatchAlarms
    Value: !Ref ApiThrottlesAlarm
  ApiDurationP95AlarmName:
    Condition: HasCloudWatchAlarms
    Value: !Ref ApiDurationP95Alarm
  ApiDashboardName:
    Condition: HasCloudWatchAlarms
    Value: !Ref ApiDashboard
  WebAclArn:
    Condition: HasWebAclArn
    Value: !Ref WebAclArn
  CloudFrontAliasDomain:
    Condition: HasCloudFrontAliasDomain
    Value: !Ref CloudFrontAliasDomain
  UsersTableName:
    Value: !Ref UsersTable
  WorkspacesTableName:
    Value: !Ref WorkspacesTable
  ProjectsTableName:
    Value: !Ref ProjectsTable
  ProjectFilesTableName:
    Value: !Ref ProjectFilesTable
  LicensesTableName:
    Value: !Ref LicensesTable
  LogsTableName:
    Value: !Ref LogsTable
  WebSocketConnectionsTableName:
    Value: !Ref WebSocketConnectionsTable
  AdminAuditTableName:
    Value: !Ref AdminAuditTable
